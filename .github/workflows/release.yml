# .github/workflows/release.yml
name: Release Production Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  build-release:
    name: Build Release APK & AAB
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Build APK (universal)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build AAB (Google Play)
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Rename build artifacts
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          mkdir -p release-artifacts
          cp android/app/build/outputs/apk/release/app-release.apk \
             release-artifacts/SweetSync-${VERSION}.apk
          cp android/app/build/outputs/bundle/release/app-release.aab \
             release-artifacts/SweetSync-${VERSION}.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SweetSync-APK-${{ steps.version.outputs.tag }}
          path: release-artifacts/SweetSync-${{ steps.version.outputs.tag }}.apk
          retention-days: 90

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: SweetSync-AAB-${{ steps.version.outputs.tag }}
          path: release-artifacts/SweetSync-${{ steps.version.outputs.tag }}.aab
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SweetSync ${{ steps.version.outputs.tag }}
          body: |
            ## SweetSync ${{ steps.version.outputs.tag }}

            ### 📱 Pliki do pobrania
            - **APK** – instalacja bezpośrednia na Android
            - **AAB** – do przesłania na Google Play

            ### 📋 Jak zainstalować APK
            1. Pobierz plik `.apk` poniżej
            2. Na telefonie: Ustawienia → Bezpieczeństwo → Zezwalaj na instalację z nieznanych źródeł
            3. Otwórz pobrany plik i zainstaluj
          files: |
            release-artifacts/SweetSync-${{ steps.version.outputs.tag }}.apk
            release-artifacts/SweetSync-${{ steps.version.outputs.tag }}.aab
          draft: false
          prerelease: false

  build-web:
    name: Build Web (Vercel)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Export web build
        run: npx expo export --platform web

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: SweetSync-Web-${{ github.sha }}
          path: dist/
          retention-days: 90
